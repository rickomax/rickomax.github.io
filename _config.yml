title: Ricardo Reis
description: Ricardo Reis website
theme: just-the-docs

# ── Navigation ────────────────────────────────────────────────────
nav_sort: case_insensitive
# heading_anchors: true  # uncomment to add anchors to all headings

# ── Search ────────────────────────────────────────────────────────
search_enabled: true
search:
  heading_level: 3       # index headings down to h3 (method names)
  previews: 2
  preview_words_before: 3
  preview_words_after: 7
  tokenizer_separator: /[\s\-\.]+/

# ── Colour scheme ─────────────────────────────────────────────────
